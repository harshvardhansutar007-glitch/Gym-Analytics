{% extends "base.html" %}

{% block title %}Login / Register - Gym Analytics{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h2><i class="fas fa-dumbbell" style="color: var(--accent);"></i> Gym Analytics</h2>
            <p>Welcome back! Please login to continue.</p>
        </div>
        
        <div class="auth-tabs">
            <div class="auth-tab {{ 'active' if page == 'login' else '' }}" data-tab="login">
                Login
            </div>
            <div class="auth-tab {{ 'active' if page == 'register' else '' }}" data-tab="register">
                Register
            </div>
        </div>
        
        <!-- Login Form -->
        <form method="POST" action="{{ url_for('login') }}" class="auth-form {{ 'active' if page == 'login' else '' }}" id="login-form">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Password</label>
                <div style="position: relative;">
                    <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                    <span class="password-toggle" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-secondary);">
                        <i class="fas fa-eye"></i>
                    </span>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
            
            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary);">
                Don't have an account? <a href="#" class="switch-tab" data-tab="register" style="color: var(--accent);">Register here</a>
            </p>
        </form>
        
        <!-- Register Form -->
        <form method="POST" action="{{ url_for('register') }}" class="auth-form {{ 'active' if page == 'register' else '' }}" id="register-form">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">First Name</label>
                    <input type="text" name="first_name" class="form-control" placeholder="First name" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Last Name</label>
                    <input type="text" name="last_name" class="form-control" placeholder="Last name" required>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Choose a username" required minlength="3">
            </div>
            
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Phone</label>
                <input type="tel" name="phone" class="form-control" placeholder="Enter your phone number">
            </div>
            
            <div class="form-group">
                <label class="form-label">I am a</label>
                <select name="role" class="form-control form-select">
                    <option value="member">Gym Member</option>
                    <option value="trainer">Trainer</option>
                </select>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Create password" required minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" name="confirm_password" class="form-control" placeholder="Confirm password" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-user-plus"></i> Register
            </button>
            
            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary);">
                Already have an account? <a href="#" class="switch-tab" data-tab="login" style="color: var(--accent);">Login here</a>
            </p>
        </form>
    </div>
</div>

<style>
    .auth-form { display: none; }
    .auth-form.active { display: block; }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const tabs = document.querySelectorAll('.auth-tab');
    const forms = document.querySelectorAll('.auth-form');
    const switchLinks = document.querySelectorAll('.switch-tab');
    
    tabs.forEach(function(tab) {
        tab.addEventListener('click', function() {
            const tabName = this.dataset.tab;
            
            tabs.forEach(function(t) { t.classList.remove('active'); });
            forms.forEach(function(f) { f.classList.remove('active'); });
            
            this.classList.add('active');
            document.getElementById(tabName + '-form').classList.add('active');
        });
    });
    
    switchLinks.forEach(function(link) {
        link.addEventListener('click', function(e) {
            e.preventDefault();
            const tabName = this.dataset.tab;
            
            tabs.forEach(function(t) { t.classList.remove('active'); });
            forms.forEach(function(f) { f.classList.remove('active'); });
            
            document.querySelector('.auth-tab[data-tab="' + tabName + '"]').classList.add('active');
            document.getElementById(tabName + '-form').classList.add('active');
        });
    });
});
</script>
{% endblock %}
